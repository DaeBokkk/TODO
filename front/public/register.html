<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 부동산 AI 챗봇</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #333;
      padding: 40px 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 로고 ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #1a6fc4, #0d9488);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 24px; height: 24px; fill: #fff; }

    .logo-text {
      font-size: 1.3rem; font-weight: 700;
      color: #1a6fc4; letter-spacing: -0.5px;
    }

    .subtitle { font-size: 0.85rem; color: #6b7280; margin-bottom: 28px; }

    h2 { font-size: 1.6rem; font-weight: 700; color: #111827; margin-bottom: 4px; }

    .desc { font-size: 0.85rem; color: #6b7280; margin-bottom: 28px; }

    /* ── 폼 ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.82rem; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: #9ca3af; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.92rem; color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: #1a6fc4;
      box-shadow: 0 0 0 3px rgba(26, 111, 196, 0.15);
      background: #fff;
    }

    /* 비밀번호 강도 바 */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #e5e7eb;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* 약관 동의 */
    .agree-wrap {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 0.82rem; color: #6b7280;
      margin-bottom: 20px; cursor: pointer;
    }

    .agree-wrap input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #1a6fc4;
      margin-top: 1px; cursor: pointer; flex-shrink: 0;
    }

    .agree-wrap a { color: #1a6fc4; text-decoration: none; font-weight: 500; }
    .agree-wrap a:hover { text-decoration: underline; }

    /* 버튼 */
    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1a6fc4, #0d9488);
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* 하단 링크 */
    .bottom-link {
      text-align: center; margin-top: 22px;
      font-size: 0.85rem; color: #6b7280;
    }

    .bottom-link a { color: #1a6fc4; font-weight: 600; text-decoration: none; }
    .bottom-link a:hover { text-decoration: underline; }

    /* 관심 지역 태그 */
    .tag-group {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 6px;
    }

    .tag {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      font-size: 0.8rem; color: #6b7280;
      cursor: pointer; transition: all 0.2s;
      background: #f9fafb;
    }

    .tag.active {
      border-color: #1a6fc4;
      background: #eff6ff;
      color: #1a6fc4; font-weight: 600;
    }

    .section-title {
      font-size: 0.82rem; font-weight: 600;
      color: #374151; margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- 로고 -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H15v-5h-6v5H3V9.5z"/></svg>
    </div>
    <span class="logo-text">PropChat AI</span>
  </div>
  <p class="subtitle">부동산 AI 어시스턴트</p>

  <h2>회원가입</h2>
  <p class="desc">계정을 만들고 AI 부동산 상담을 시작하세요.</p>

  <form action="/index" method="get">

    <!-- 이름 / 닉네임 -->
    <div class="form-row">
      <div class="form-group">
        <label for="name">이름</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="name" placeholder="홍길동" required />
        </div>
      </div>
      <div class="form-group">
        <label for="nickname">닉네임</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="nickname" placeholder="부동산왕" required />
        </div>
      </div>
    </div>

    <!-- 이메일 -->
    <div class="form-group">
      <label for="email">이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>
    </div>

    <!-- 전화번호 -->
    <div class="form-group">
      <label for="phone">전화번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.9a16 16 0 0 0 6.1 6.1l1.5-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"/></svg>
        <input type="text" id="phone" placeholder="010-0000-0000" />
      </div>
    </div>

    <!-- 비밀번호 -->
    <div class="form-group">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="8자 이상 입력하세요" required oninput="checkStrength(this.value)" />
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <p class="strength-label" id="strengthLabel">비밀번호를 입력해 주세요</p>
    </div>

    <!-- 비밀번호 확인 -->
    <div class="form-group">
      <label for="password2">비밀번호 확인</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password2" placeholder="비밀번호를 다시 입력하세요" required />
      </div>
    </div>

    <!-- 관심 지역 -->
    <div class="form-group">
      <p class="section-title">관심 지역 (선택)</p>
      <div class="tag-group" id="regionTags">
        <span class="tag" onclick="toggleTag(this)">서울</span>
        <span class="tag" onclick="toggleTag(this)">경기</span>
        <span class="tag" onclick="toggleTag(this)">인천</span>
        <span class="tag" onclick="toggleTag(this)">부산</span>
        <span class="tag" onclick="toggleTag(this)">대구</span>
        <span class="tag" onclick="toggleTag(this)">대전</span>
        <span class="tag" onclick="toggleTag(this)">광주</span>
        <span class="tag" onclick="toggleTag(this)">제주</span>
      </div>
    </div>

    <!-- 약관 동의 -->
    <label class="agree-wrap">
      <input type="checkbox" required />
      <span><a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다. (필수)</span>
    </label>

    <label class="agree-wrap" style="margin-bottom:24px;">
      <input type="checkbox" />
      <span>부동산 매물 정보 및 마케팅 알림 수신에 동의합니다. (선택)</span>
    </label>

    <button type="submit" class="btn-primary">회원가입 완료</button>
  </form>

  <p class="bottom-link">이미 계정이 있으신가요? <a href="/login">로그인</a></p>

</div>

<script>
  function checkStrength(val) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const map = [
      { w: '0%',   bg: '#e5e7eb', txt: '비밀번호를 입력해 주세요' },
      { w: '25%',  bg: '#ef4444', txt: '매우 약함' },
      { w: '50%',  bg: '#f97316', txt: '약함' },
      { w: '75%',  bg: '#eab308', txt: '보통' },
      { w: '100%', bg: '#22c55e', txt: '강함' },
    ];
    const s = val.length === 0 ? 0 : score;
    fill.style.width      = map[s].w;
    fill.style.background = map[s].bg;
    label.textContent     = map[s].txt;
    label.style.color     = map[s].bg;
  }

  function toggleTag(el) {
    el.classList.toggle('active');
  }
</script>

</body>
</html>
