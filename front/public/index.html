<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅 - 부동산 AI 챗봇</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H15v-5h-6v5H3V9.5z"/></svg>
      </div>
      <span>부동산 AI</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 대화 시작
    </button>

    <p class="sidebar-section-label">최근 대화</p>
    <div class="chat-list" id="chatList"></div>

  </aside>

  <main class="main">
    <header class="chat-header">
      <div class="chat-header-left">
        <div class="bot-avatar">
          <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H15v-5h-6v5H3V9.5z"/></svg>
        </div>
        <div>
          <p class="bot-name">부동산 AI</p>
        </div>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="quick-chips">
      <span class="chip">전세 매물 보기</span>
      <span class="chip">월세 계산기</span>
      <span class="chip">청약 자격 확인</span>
      <span class="chip">시세 변동 추이</span>
      <span class="chip">근처 학군 정보</span>
    </div>

    <div class="input-area">
      <div class="input-box">

        <textarea
          id="userInput"
          rows="1"
          placeholder="부동산에 대해 무엇이든 물어보세요..."
        ></textarea>

        <button class="send-btn" id="sendBtn" title="전송" type="button">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        </button>
      </div>
      <p class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <!-- 마크다운 렌더링 라이브러리 -->
  <script src="js/index.js"></script>
</body>
</html>
