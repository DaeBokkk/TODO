<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 부동산 AI 챗봇</title>
  <style>
    /* ── 전역 리셋 및 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #333;
    }

    /* ── 카드 ── */
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 로고 / 헤더 ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #1a6fc4, #0d9488);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 24px; height: 24px; fill: #fff; }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a6fc4;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }

    /* ── 폼 ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #9ca3af;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.92rem;
      color: #111827;
      background: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #1a6fc4;
      box-shadow: 0 0 0 3px rgba(26, 111, 196, 0.15);
      background: #fff;
    }

    /* ── 옵션 행 ── */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 0.82rem;
    }

    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      cursor: pointer;
    }

    .remember-wrap input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1a6fc4;
      cursor: pointer;
    }

    .forgot-link {
      color: #1a6fc4;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* ── 버튼 ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a6fc4, #0d9488);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── 구분선 ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #9ca3af;
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* ── 소셜 버튼 ── */
    .social-btn {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s;
    }

    .social-btn:hover { background: #f3f4f6; border-color: #9ca3af; }

    .social-btn img { width: 20px; height: 20px; }

    /* ── 하단 링크 ── */
    .bottom-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .bottom-link a {
      color: #1a6fc4;
      font-weight: 600;
      text-decoration: none;
    }

    .bottom-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">

  <!-- 로고 -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H15v-5h-6v5H3V9.5z"/></svg>
    </div>
    <span class="logo-text">PropChat AI</span>
  </div>
  <p class="subtitle">부동산 AI 어시스턴트</p>

  <h2>로그인</h2>
  <p style="font-size:0.85rem;color:#6b7280;margin-bottom:28px;">계속하려면 계정에 로그인하세요.</p>

  <form action="/" method="get">

    <!-- 이메일 -->
    <div class="form-group">
      <label for="email">이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>
    </div>

    <!-- 비밀번호 -->
    <div class="form-group">
      <label for="password">비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required />
      </div>
    </div>

    <!-- 옵션 -->
    <div class="options-row">
      <label class="remember-wrap">
        <input type="checkbox" /> 로그인 상태 유지
      </label>
      <a href="#" class="forgot-link">비밀번호 찾기</a>
    </div>

    <button type="submit" class="btn-primary">로그인</button>
  </form>

  <!-- 소셜 로그인 -->
  <div class="divider">또는</div>
  <button class="social-btn">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.1 29.6 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6-6C34.4 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5c10.5 0 20-8.5 20-20.5 0-1.4-.1-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.1 13 24 13c3 0 5.7 1.1 7.8 2.9l6-6C34.4 6.5 29.5 4.5 24 4.5c-7.7 0-14.3 4.4-17.7 10.2z"/><path fill="#FBBC05" d="M24 45.5c5.4 0 10.3-1.8 14-4.9l-6.5-5.3C29.5 37 26.9 38 24 38c-5.5 0-10.2-3.7-11.8-8.8l-7 5.4C8.5 41.5 15.7 45.5 24 45.5z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.8 2.3-2.3 4.3-4.2 5.7l6.5 5.3c3.8-3.5 6-8.7 6-15.5 0-1.4-.1-2.7-.5-4z"/></svg>
    Google로 로그인
  </button>

  <!-- 회원가입 링크 -->
  <p class="bottom-link">계정이 없으신가요? <a href="/register">회원가입</a></p>

</div>

</body>
</html>
